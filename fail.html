<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed — Minella Jewels</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf6f0;font-family:'Outfit',sans-serif;color:#1c1018;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;padding:48px 36px;text-align:center;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(28,16,24,0.12);}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:400;color:#b83232;margin-bottom:12px;}
p{color:#8a7878;font-size:15px;line-height:1.7;margin-bottom:28px;}
.btn{display:inline-block;background:#4a1942;color:#fff;padding:13px 36px;border-radius:40px;font-size:14px;font-weight:500;text-decoration:none;margin:6px;transition:.2s;}
.btn:hover{background:#6b2d61;}
.btn-sec{background:transparent;color:#4a1942;border:1.5px solid #4a1942;}
.btn-sec:hover{background:#faf6f0;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>Payment Failed</h1>
  <p>Your payment could not be processed. No money has been charged. Please try again or choose a different payment method.</p>
  <a href="https://minella.in" class="btn">Try Again</a>
</div>
</body>
</html>
