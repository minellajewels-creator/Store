<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minella Jewels — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf6f0;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border-radius:16px;padding:48px 36px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(28,16,24,0.10)}
.logo{font-family:'Libre Baskerville',serif;font-size:28px;color:#4a1942;letter-spacing:1px;margin-bottom:8px}
.logo em{font-style:italic;color:#b8903a}
.tag{display:inline-block;background:rgba(184,144,58,0.12);border:1px solid rgba(184,144,58,0.25);border-radius:20px;padding:5px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#b8903a;margin-bottom:20px}
p{font-size:14px;color:#8a7878;line-height:1.8;font-weight:300}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Minella <em>Jewels</em></div>
  <div class="tag">✦ Coming Soon</div>
  <p>We're adding some finishing touches.<br>Back very soon with something beautiful.</p>
</div>
</body>
</html>
