<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minella Jewels — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0810;--plum:#4a1942;--plum2:#6b2d61;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e6b8;
  --cream:#faf6f0;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);
  font-family:'Cormorant Garamond',serif;color:var(--cream);cursor:none}

/* CURSOR */
#cursor{position:fixed;z-index:9999;width:10px;height:10px;background:var(--gold);
  border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cursor-ring{position:fixed;z-index:9998;width:34px;height:34px;
  border:1.5px solid rgba(201,168,76,0.5);border-radius:50%;pointer-events:none;
  transform:translate(-50%,-50%);transition:width .4s,height .4s}

/* CANVAS */
#bg{position:fixed;inset:0;z-index:0}

/* GRAIN */
.grain{position:fixed;inset:0;z-index:1;opacity:.04;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;animation:grainShift .5s steps(1) infinite}
@keyframes grainShift{
  0%{background-position:0 0}20%{background-position:-30px 15px}
  40%{background-position:10px -25px}60%{background-position:-20px 30px}
  80%{background-position:25px -10px}100%{background-position:0 0}}

/* SCANLINES */
.scanline{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px)}

/* FLOATING GEMS */
.gems{position:fixed;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.gem{position:absolute;opacity:0;animation:gemFloat linear infinite;
  filter:drop-shadow(0 0 8px rgba(201,168,76,0.7))}
@keyframes gemFloat{
  0%{opacity:0;transform:translateY(105vh) rotate(0deg) scale(.5)}
  8%{opacity:.9}90%{opacity:.5}
  100%{opacity:0;transform:translateY(-15vh) rotate(720deg) scale(1.3)}}

/* STAGE */
.stage{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center}

/* RINGS */
.rings{position:absolute;width:min(580px,88vw);height:min(580px,88vw);pointer-events:none}
.ring{position:absolute;inset:0;border-radius:50%;animation:ringPulse ease-in-out infinite}
.ring:nth-child(1){border:1px solid rgba(201,168,76,0.14);animation-duration:6s;--s:1}
.ring:nth-child(2){border:1px solid rgba(201,168,76,0.10);animation-duration:9s;animation-delay:-3s;--s:.72}
.ring:nth-child(3){border:1px solid rgba(201,168,76,0.22);animation-duration:12s;animation-delay:-5s;--s:.46}
.ring:nth-child(4){border:1px solid rgba(201,168,76,0.06);animation-duration:7s;animation-delay:-1s;--s:1.28}
@keyframes ringPulse{
  0%,100%{opacity:.4;transform:scale(var(--s)) rotate(0deg)}
  50%{opacity:1;transform:scale(calc(var(--s)*1.04)) rotate(180deg)}}

/* ORBITS */
.ornament{position:absolute;width:min(540px,86vw);height:min(540px,86vw);pointer-events:none}
.orbit{position:absolute;width:100%;height:100%;animation:orbitSpin linear infinite}
.orbit-a{animation-duration:22s}
.orbit-b{animation-duration:35s;animation-direction:reverse}
.orbit-c{animation-duration:14s;width:52%;height:52%;top:24%;left:24%}
.orbit-d{animation-duration:50s;width:82%;height:82%;top:9%;left:9%}
@keyframes orbitSpin{to{transform:rotate(360deg)}}
.odot{position:absolute;border-radius:50%;top:0;left:50%;transform:translate(-50%,-50%)}
.odot-lg{width:7px;height:7px;background:var(--gold);
  box-shadow:0 0 14px var(--gold),0 0 28px rgba(201,168,76,0.4)}
.odot-sm{width:4px;height:4px;background:var(--gold2);
  box-shadow:0 0 10px var(--gold2)}
.odiamond{position:absolute;width:9px;height:9px;background:var(--gold2);
  transform:rotate(45deg);top:50%;right:0;transform-origin:center;
  box-shadow:0 0 10px var(--gold2);animation:diamondGlow 3s ease-in-out infinite}
@keyframes diamondGlow{
  0%,100%{box-shadow:0 0 10px var(--gold2)}
  50%{box-shadow:0 0 24px var(--gold2),0 0 48px rgba(232,201,122,0.3)}}

/* CENTER */
.center{position:absolute;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0}

.logo-crown{font-size:clamp(32px,5vw,52px);display:block;margin-bottom:10px;
  animation:crownFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 0 24px rgba(201,168,76,0.9))}
@keyframes crownFloat{
  0%,100%{transform:translateY(0) rotate(-2deg);filter:drop-shadow(0 0 20px rgba(201,168,76,.8))}
  50%{transform:translateY(-12px) rotate(2deg);filter:drop-shadow(0 0 44px rgba(201,168,76,1))}}

.brand{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(36px,9vw,96px);
  letter-spacing:clamp(6px,2vw,20px);
  text-transform:uppercase;line-height:1;
  background:linear-gradient(135deg,#a07830 0%,#c9a84c 25%,#f5e6b8 50%,#e8c97a 75%,#c9a84c 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShimmer 5s ease-in-out infinite, brandIn 1.5s cubic-bezier(.16,1,.3,1) both .2s}
@keyframes goldShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes brandIn{
  from{opacity:0;transform:translateY(36px) skewX(-6deg);letter-spacing:clamp(24px,6vw,80px)}
  to{opacity:1;transform:none;letter-spacing:clamp(6px,2vw,20px)}}

.subtitle{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:clamp(11px,2vw,16px);letter-spacing:5px;text-transform:uppercase;
  color:rgba(250,246,240,0.45);
  animation:fadeUp 1s ease both .9s}

.divider{display:flex;align-items:center;gap:16px;margin:18px 0 14px;
  width:clamp(180px,48vw,380px);animation:fadeUp 1s ease both .7s}
.divider-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.5),transparent)}
.divider-gem{color:var(--gold);font-size:16px;animation:spinGem 10s linear infinite;display:inline-block}
@keyframes spinGem{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.badge{
  margin-top:24px;
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(201,168,76,0.3);border-radius:40px;
  padding:10px 24px;backdrop-filter:blur(10px);
  background:rgba(201,168,76,0.05);
  font-family:'Cinzel',serif;font-size:clamp(8px,1.4vw,11px);
  letter-spacing:3px;text-transform:uppercase;color:var(--gold);
  animation:fadeUp 1s ease both 1.1s, badgePulse 3s ease-in-out infinite 2.4s}
@keyframes badgePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}
  50%{box-shadow:0 0 0 10px rgba(201,168,76,0.07),0 0 50px rgba(201,168,76,0.08)}}
.pulse-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;
  animation:pdot 1.6s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.4}}

/* NOTIFY */
.notify-wrap{
  margin-top:30px;width:clamp(260px,52vw,420px);
  display:flex;border-radius:50px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(201,168,76,.22),0 24px 64px rgba(0,0,0,.5);
  animation:fadeUp 1s ease both 1.4s}
.notify-input{
  flex:1;background:rgba(255,255,255,0.04);border:none;outline:none;
  padding:14px 22px;font-family:'Cormorant Garamond',serif;
  font-size:15px;color:var(--cream);letter-spacing:.5px}
.notify-input::placeholder{color:rgba(250,246,240,.28);font-style:italic}
.notify-btn{
  background:linear-gradient(135deg,#c9a84c,#e8c97a);border:none;cursor:pointer;
  padding:14px 26px;font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);
  transition:filter .2s,transform .15s;white-space:nowrap}
.notify-btn:hover{filter:brightness(1.12);transform:scale(1.04)}
.notify-btn:active{transform:scale(.97)}
.notify-ok{display:none;color:var(--gold2);font-style:italic;font-size:14px;
  margin-top:12px;letter-spacing:1px;animation:fadeUp .5s ease}

/* BOTTOM */
.bottom{position:fixed;bottom:28px;left:0;right:0;z-index:20;
  display:flex;justify-content:center;align-items:center;gap:clamp(16px,4vw,44px);
  animation:fadeUp 1s ease both 1.8s}
.blink{font-family:'Cormorant Garamond',serif;font-size:clamp(11px,1.6vw,13px);
  letter-spacing:2px;text-transform:uppercase;color:rgba(250,246,240,.38);
  text-decoration:none;position:relative;transition:color .3s}
.blink::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;
  background:var(--gold);transform:scaleX(0);transition:transform .3s;transform-origin:left}
.blink:hover{color:var(--gold)}.blink:hover::after{transform:scaleX(1)}
.sep{color:rgba(201,168,76,.28);font-size:16px}

/* SPARKLE */
.sp{position:fixed;pointer-events:none;z-index:9000;border-radius:50%;background:var(--gold);
  animation:spBurst .7s ease forwards}
@keyframes spBurst{0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

@media(max-width:480px){
  .rings,.ornament{width:320px;height:320px}
  .notify-wrap{width:90vw}
  .bottom{gap:14px}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg"></canvas>
<div class="grain"></div>
<div class="scanline"></div>
<div class="gems" id="gems"></div>

<div class="stage">
  <div class="rings">
    <div class="ring"></div><div class="ring"></div>
    <div class="ring"></div><div class="ring"></div>
  </div>

  <div class="ornament">
    <div class="orbit orbit-a"><div class="odot odot-lg"></div></div>
    <div class="orbit orbit-b"><div class="odiamond"></div></div>
    <div class="orbit orbit-c"><div class="odot odot-sm"></div></div>
    <div class="orbit orbit-d">
      <div class="odot odot-sm" style="top:auto;bottom:0;left:50%"></div>
    </div>
  </div>

  <div class="center">
    <span class="logo-crown">♛</span>
    <div class="brand">Minella</div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-gem">◆</span>
      <div class="divider-line"></div>
    </div>
    <div class="subtitle">Jewels &nbsp;·&nbsp; Coimbatore</div>
    <div class="badge"><span class="pulse-dot"></span>Crafting Something Beautiful</div>
    <div class="notify-wrap">
      <input class="notify-input" id="notifyEmail" type="email" placeholder="your@email.com — notify me when live">
      <button class="notify-btn" onclick="handleNotify()">Notify</button>
    </div>
    <div class="notify-ok" id="notifyOk">✦ We'll tell you the moment we're live 💜</div>
  </div>
</div>

<div class="bottom">
  <a href="/track.html" class="blink">Track Order</a>
  <span class="sep">◆</span>
  <a href="https://wa.me/919080014835" target="_blank" class="blink">WhatsApp Us</a>
  <span class="sep">◆</span>
  <a href="mailto:minellajewels@gmail.com" class="blink">Contact</a>
</div>

<script>
// ── CURSOR ──
var cur  = document.getElementById('cursor');
var ring = document.getElementById('cursor-ring');
var mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;
document.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function raf(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(raf);
})();

// ── CANVAS ──
var cv  = document.getElementById('bg');
var ctx = cv.getContext('2d');
var W, H;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); addEventListener('resize', resize);

// Stars
var stars = [];
for(var i=0;i<180;i++) stars.push({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.3+.2, a:Math.random(), sp:Math.random()*.005+.001 });

// Particles
var P = [];
function mkP(){ return {
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.45, vy:(Math.random()-.5)*.45,
  r:Math.random()*2+.5, a:0, ta:Math.random()*.5+.1,
  life:0, max:200+Math.random()*350 }; }
for(var j=0;j<90;j++) P.push(mkP());

function loop(){
  ctx.clearRect(0,0,W,H);

  // bg gradient
  var g=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.75);
  g.addColorStop(0,'#1e0a1c'); g.addColorStop(.55,'#110612'); g.addColorStop(1,'#080308');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // stars
  for(var s=0;s<stars.length;s++){
    var st=stars[s]; st.a+=st.sp;
    var al=(Math.sin(st.a)+1)/2*.7+.1;
    ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2);
    ctx.fillStyle='rgba(245,230,184,'+al+')'; ctx.fill();
  }

  // connections
  for(var a=0;a<P.length;a++) for(var b=a+1;b<P.length;b++){
    var dx=P[a].x-P[b].x, dy=P[a].y-P[b].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){ var al2=(1-d/110)*.14;
      ctx.beginPath(); ctx.moveTo(P[a].x,P[a].y); ctx.lineTo(P[b].x,P[b].y);
      ctx.strokeStyle='rgba(201,168,76,'+al2+')'; ctx.lineWidth=.5; ctx.stroke(); }
  }

  // particles
  for(var p=0;p<P.length;p++){
    var pt=P[p]; pt.life++;
    var t=pt.life/pt.max; pt.a=pt.ta*Math.sin(t*Math.PI);
    pt.x+=pt.vx; pt.y+=pt.vy;
    if(pt.life>=pt.max) P[p]=mkP();
    // repel from cursor
    var ddx=pt.x-mx, ddy=pt.y-my, dd=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dd<120){ pt.vx+=(ddx/dd)*.18; pt.vy+=(ddy/dd)*.18; }
    pt.vx*=.99; pt.vy*=.99;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
    ctx.fillStyle='rgba(201,168,76,'+pt.a+')'; ctx.fill();
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*3.5,0,Math.PI*2);
    ctx.fillStyle='rgba(201,168,76,'+(pt.a*.12)+')'; ctx.fill();
  }
  requestAnimationFrame(loop);
}
loop();

// ── FLOATING GEMS ──
var GEMS=['💎','✦','◆','✧','♦','◇','✴','❋','⬡','✾'];
var gemsEl=document.getElementById('gems');
function spawnGem(){
  var el=document.createElement('span'); el.className='gem';
  el.textContent=GEMS[Math.floor(Math.random()*GEMS.length)];
  el.style.left=(Math.random()*94+1)+'%';
  var dur=7+Math.random()*14;
  el.style.animationDuration=dur+'s';
  el.style.animationDelay=(Math.random()*1.5)+'s';
  el.style.fontSize=(11+Math.random()*20)+'px';
  gemsEl.appendChild(el);
  setTimeout(function(){ el.remove(); },(dur+2)*1000);
}
for(var g=0;g<14;g++) setTimeout(spawnGem, g*500);
setInterval(spawnGem, 1600);

// ── SPARKLE ON CLICK ──
document.addEventListener('click', function(e){
  for(var s=0;s<14;s++){
    var el=document.createElement('div'); el.className='sp';
    el.style.left=e.clientX+'px'; el.style.top=e.clientY+'px';
    var angle=(s/14)*Math.PI*2, dist=28+Math.random()*55;
    el.style.setProperty('--tx',(Math.cos(angle)*dist)+'px');
    el.style.setProperty('--ty',(Math.sin(angle)*dist)+'px');
    var sz=(2+Math.random()*6)+'px';
    el.style.width=sz; el.style.height=sz;
    el.style.animationDelay=(Math.random()*.12)+'s';
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 900);
  }
});

// ── NOTIFY ──
function handleNotify(){
  var v=document.getElementById('notifyEmail').value.trim();
  if(!v||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
    document.getElementById('notifyEmail').style.outline='1px solid '+getComputedStyle(document.documentElement).getPropertyValue('--gold');
    return;
  }
  document.querySelector('.notify-wrap').style.cssText='opacity:.4;pointer-events:none;transition:opacity .4s';
  var ok=document.getElementById('notifyOk'); ok.style.display='block';
}
</script>
</body>
</html>
